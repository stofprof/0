<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Browser</title>
    <style>
        :root {
            /* Light Theme */
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --border-color: #E2E8F0;
            --hover-bg: #F1F5F9;
            --primary: #3B82F6;
            --icon-color: #94A3B8;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --hover-bg: #334155;
            --primary: #60A5FA;
            --icon-color: #CBD5E1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-primary); padding: 2rem; min-height: 100vh; }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Header */
        header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-start; }
        .titles h1 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .titles p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem; }

        /* Header Actions Group */
        .header-actions { display: flex; gap: 0.75rem; align-items: center; }

        /* Generic Header Button Styling */
        .header-btn {
            background: var(--card-bg); border: 1px solid var(--border-color);
            width: 40px; height: 40px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            color: var(--text-secondary); text-decoration: none;
        }
        .header-btn:hover { background: var(--hover-bg); color: var(--primary); border-color: var(--primary); }
        .header-btn svg { width: 20px; height: 20px; display: none; }
        .header-btn .icon-show { display: block; }

        /* Dropdown Menu for Sort Button */
        .dropdown { position: relative; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 180px;
            z-index: 50;
            padding: 0.5rem 0;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            display: block;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .dropdown-item:hover { background-color: var(--hover-bg); color: var(--primary); }

        /* Sort Arrow Styling */
        .sort-arrow {
            padding-left: 0.5rem; margin-left: 0;
            opacity: 0.5;
            font-weight: normal;
        }

        /* Controls Bar */
        .controls {
            background: var(--card-bg); padding: 1rem; border-radius: 12px;
            box-shadow: var(--shadow); display: flex; gap: 1rem; align-items: center;
            margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 200px; }
        .search-box input {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 0.95rem; outline: none; background: var(--bg-color); color: var(--text-primary);
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); width: 18px; height: 18px; }

        /* File Browser Container */
        .file-browser { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }

        /* --- LIST VIEW --- */
        .file-list { list-style: none; }
        .file-list.list { display: block; }
        .file-header {
            display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr;
            padding: 1rem 1.5rem; background-color: var(--hover-bg); border-bottom: 1px solid var(--border-color);
            font-weight: 600; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .sortable { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 0; }
        .sortable:hover { color: var(--text-primary); }

        .file-list.list .file-item {
            display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr;
            padding: 1rem 1.5rem; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .file-list.list .file-item:last-child { border-bottom: none; }
        .file-list.list .file-item:hover { background-color: var(--hover-bg); }
        .file-list.list .col-name { display: flex; align-items: center; gap: 1rem; font-weight: 500; }
        .file-list.list .col-type, .file-list.list .col-size, .file-list.list .col-date { font-size: 0.9rem; color: var(--text-secondary); }

        /* --- GRID VIEW --- */
        .file-list.grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }
        .file-list.grid .file-header { display: none; }
        .file-list.grid .file-item {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 2rem 1rem;
            border: 1px solid var(--border-color); border-radius: 12px;
            background: var(--card-bg);
            text-decoration: none; color: inherit;
        }
        .file-list.grid .file-item:hover {
            transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--primary);
        }
        .file-list.grid .col-name { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
        .file-list.grid .col-name span { font-weight: 500; word-break: break-word; line-height: 1.4; }
        .file-list.grid .col-type, .file-list.grid .col-size, .file-list.grid .col-date { display: none; }

        /* Icons & Links */
        .icon-link {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; text-decoration: none; flex-shrink: 0;
        }
        .icon-link:hover { background-color: rgba(0,0,0,0.05); }
        [data-theme="dark"] .icon-link:hover { background-color: rgba(255,255,255,0.05); }
        .icon-link svg { width: 28px; height: 28px; display: block; }

        .file-list.grid .icon-link { width: 64px; height: 64px; }
        .file-list.grid .icon-link svg { width: 64px; height: 64px; }

        .name-link { color: var(--text-primary); text-decoration: none; }
        .name-link:hover { color: var(--primary); text-decoration: underline; }
        .empty-state { padding: 3rem; text-align: center; color: var(--text-secondary); display: none; }

        /* Loading State */
        .loading-state { padding: 3rem; text-align: center; color: var(--text-secondary); }
        .loading-state .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border-color);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error State */
        .error-state { padding: 3rem; text-align: center; color: #EF4444; }
        .error-state p { color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .file-list.list .file-header { display: none; }
            .file-list.list .file-item { grid-template-columns: 1fr; gap: 0.5rem; padding: 1rem; }
            .file-list.list .col-name { font-size: 1.1rem; }
            .file-list.list .col-type, .file-list.list .col-size, .file-list.list .col-date { font-size: 0.85rem; padding-left: 3.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="titles">
                <h1>File Browser</h1>
                <p>Browse your files with style</p>
            </div>

            <div class="header-actions">
                <!-- Theme Toggle Button -->
                <button class="header-btn" id="themeToggle" aria-label="Toggle Theme">
                    <svg class="icon-sun icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>

                <!-- Single View Toggle Button -->
                <button class="header-btn" id="viewToggle" aria-label="Toggle View">
                    <svg class="icon-grid icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <svg class="icon-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>

                <!-- Sort Dropdown Button -->
                <div class="dropdown">
                    <button class="header-btn" id="sortToggle" aria-label="Sort Files">
                        <svg class="icon-sort icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line><path d="M4 6h.01M4 12h.01M4 18h.01"></path></svg>
                    </button>
                    <div class="dropdown-menu" id="sortMenu">
                        <button class="dropdown-item" data-sort="name">Sort by Name</button>
                        <button class="dropdown-item" data-sort="date">Sort by Date</button>
                        <button class="dropdown-item" data-sort="size">Sort by Size</button>
                        <button class="dropdown-item" data-sort="type">Sort by Type</button>
                    </div>
                </div>
            </div>
        </header>

        <section class="controls">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search files...">
            </div>
        </section>

        <div class="file-browser">
            <div class="file-header" id="fileHeader">
                <div class="col-name sortable" data-sort="name">Name <span class="sort-arrow">&#8645;</span></div>
                <div class="col-type sortable" data-sort="type">Type <span class="sort-arrow">&#8645;</span></div>
                <div class="col-size sortable" data-sort="size">Size <span class="sort-arrow">&#8645;</span></div>
                <div class="col-date sortable" data-sort="date">Modified <span class="sort-arrow">&#8645;</span></div>
            </div>

            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p>Loading files...</p>
            </div>

            <div class="error-state" id="errorState" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:0.5rem;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <p>Failed to load files. Please check your repository settings.</p>
            </div>

            <ul class="file-list list" id="fileList"></ul>

            <div id="noResults" class="empty-state">No files match your search.</div>
            <div id="emptyState" class="empty-state">No files found.</div>
        </div>
    </div>

    <script>
        // ========================
        // CONFIGURATION
        // ========================
        // Set your GitHub username and repository name here:
        const GITHUB_USER = 'stofprof';      // <-- CHANGE THIS
        const GITHUB_REPO = 'mypages';       // <-- CHANGE THIS
        const REPO_PATH = '';                       // <-- Leave empty for root, or e.g. 'docs/'
        const HIDDEN_FILES = ['index.html', '.gitignore', 'README.md']; // Add files to hide
        const TIME_FORMAT = { month: 'short', day: 'numeric', year: 'numeric' };

        // ========================
        // STATE
        // ========================
        let allFiles = [];
        let sortColumn = 'name';
        let sortOrder = 'asc';
        let viewMode = 'list';

        // ========================
        // ICONS
        // ========================
        const iconColor = 'var(--icon-color)';

        const icons = {
            folder: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 7V17C3 18.1046 3.89543 19 5 19H19C20.1046 19 21 18.1046 21 17V9C21 7.89543 20.1046 7 19 7H12L10 5H5C3.89543 5 3 5.89543 3 7Z" fill="none" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            image: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 19V5C21 3.89543 20.1046 3 19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19Z" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8.5" cy="8.5" r="1.5" fill="${iconColor}"/><path d="M21 15L16 10L5 21" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            code: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2V8H20" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 13L8 15L10 17" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 13L16 15L14 17" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            excel: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2V8H20" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 13H16" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 17H16" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 9H10" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            zip: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 8V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16L21 8Z" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 21V13H7V21" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 8V3" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
            default: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 2V9H20" stroke="${iconColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        };

        function getFileIcon(filename, isDir) {
            if (isDir) return icons.folder;
            const ext = filename.split('.').pop().toLowerCase();
            switch (ext) {
                case 'png': case 'jpg': case 'jpeg': case 'gif': case 'svg': case 'webp': case 'bmp':
                    return icons.image;
                case 'js': case 'php': case 'html': case 'css': case 'json': case 'py': case 'java': case 'cpp': case 'c': case 'h': case 'ts': case 'jsx': case 'tsx': case 'xml': case 'yaml': case 'yml':
                    return icons.code;
                case 'xls': case 'xlsx': case 'csv': case 'ods':
                    return icons.excel;
                case 'zip': case 'rar': case 'tar': case 'gz': case 'bz2': case '7z':
                    return icons.zip;
                default:
                    return icons.default;
            }
        }

        function formatSize(bytes) {
            if (bytes === undefined || bytes === null) return '—';
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(2) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return bytes + ' bytes';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '—';
            return d.toLocaleDateString('en-US', TIME_FORMAT);
        }

        // ========================
        // FETCH FILES FROM GITHUB
        // ========================
        async function fetchFiles() {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const fileList = document.getElementById('fileList');

            loadingState.style.display = 'block';
            errorState.style.display = 'none';
            fileList.innerHTML = '';

            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${REPO_PATH}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                // Filter out hidden files
                allFiles = data
                    .filter(item => !HIDDEN_FILES.includes(item.name))
                    .map(item => ({
                        name: item.name,
                        type: item.type === 'dir' ? 'Folder' : (item.name.split('.').pop().toUpperCase() || 'File'),
                        size: item.type === 'dir' ? '-' : item.size,
                        date: item.type === 'dir' ? null : null, // GitHub Contents API doesn't return dates; we'll try to enrich
                        isDir: item.type === 'dir',
                        html_url: item.html_url,
                        download_url: item.download_url,
                        path: item.path
                    }));

                // Try to fetch commit dates for files (best effort, may hit rate limits)
                // For simplicity and reliability, we skip per-file dates in the basic version
                // You can uncomment the below to attempt date fetching (slower, more API calls):
                /*
                for (let file of allFiles) {
                    if (!file.isDir) {
                        try {
                            const commitRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?path=${file.path}&per_page=1`);
                            if (commitRes.ok) {
                                const commits = await commitRes.json();
                                if (commits.length > 0) {
                                    file.date = commits[0].commit.committer.date;
                                }
                            }
                        } catch (e) { }
                    }
                }
                */

                loadingState.style.display = 'none';

                if (allFiles.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    sortAndRender();
                }

            } catch (err) {
                loadingState.style.display = 'none';
                errorState.style.display = 'block';
                console.error('Error fetching files:', err);
            }
        }

        // ========================
        // SORTING & RENDERING
        // ========================
        function sortFiles() {
            allFiles.sort((a, b) => {
                // Folders always first
                if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;

                let valA = a[sortColumn];
                let valB = b[sortColumn];

                if (valA == null) valA = '';
                if (valB == null) valB = '';

                if (sortColumn === 'name') {
                    const cmp = valA.toString().localeCompare(valB.toString(), undefined, { sensitivity: 'base', numeric: true });
                    return sortOrder === 'asc' ? cmp : -cmp;
                }

                if (sortColumn === 'size') {
                    const sizeA = valA === '-' ? -1 : parseInt(valA);
                    const sizeB = valB === '-' ? -1 : parseInt(valB);
                    return sortOrder === 'asc' ? (sizeA - sizeB) : (sizeB - sizeA);
                }

                if (sortColumn === 'date') {
                    const dateA = valA ? new Date(valA).getTime() : 0;
                    const dateB = valB ? new Date(valB).getTime() : 0;
                    return sortOrder === 'asc' ? (dateA - dateB) : (dateB - dateA);
                }

                // type
                const cmp = valA.toString().localeCompare(valB.toString());
                return sortOrder === 'asc' ? cmp : -cmp;
            });
        }

        function renderFiles() {
            const fileList = document.getElementById('fileList');
            const fileHeader = document.getElementById('fileHeader');

            // Update header visibility based on view mode
            fileHeader.style.display = viewMode === 'list' ? 'grid' : 'none';

            // Update sort arrows in header
            document.querySelectorAll('.file-header .sortable').forEach(el => {
                const arrow = el.querySelector('.sort-arrow');
                if (el.dataset.sort === sortColumn) {
                    arrow.textContent = sortOrder === 'asc' ? '↑' : '↓';
                    arrow.style.opacity = '1';
                } else {
                    arrow.textContent = '⇅';
                    arrow.style.opacity = '0.5';
                }
            });

            fileList.className = 'file-list ' + viewMode;
            fileList.innerHTML = '';

            allFiles.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.setAttribute('data-name', file.name.toLowerCase());

                const target = file.isDir ? '_self' : '_blank';
                const iconSvg = getFileIcon(file.name, file.isDir);
                const url = file.html_url;

                li.innerHTML = `
                    <div class="col-name">
                        <a href="${url}" target="${target}" class="icon-link">
                            ${iconSvg}
                        </a>
                        <a href="${url}" target="${target}" class="name-link">
                            ${escapeHtml(file.name)}
                        </a>
                    </div>
                    <div class="col-type">${escapeHtml(file.type)}</div>
                    <div class="col-size">${file.size === '-' ? '-' : formatSize(file.size)}</div>
                    <div class="col-date">${formatDate(file.date)}</div>
                `;

                fileList.appendChild(li);
            });

            // Re-apply search filter
            applySearch();
        }

        function sortAndRender() {
            sortFiles();
            renderFiles();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========================
        // SEARCH
        // ========================
        function applySearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.file-item');
            const noResults = document.getElementById('noResults');
            let visibleCount = 0;

            items.forEach(item => {
                const name = item.getAttribute('data-name');
                if (name.includes(term)) {
                    item.style.display = '';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            noResults.style.display = visibleCount === 0 ? 'block' : 'none';
        }

        document.getElementById('searchInput').addEventListener('input', applySearch);

        // ========================
        // THEME TOGGLE
        // ========================
        const themeToggleBtn = document.getElementById('themeToggle');
        const iconSun = themeToggleBtn.querySelector('.icon-sun');
        const iconMoon = themeToggleBtn.querySelector('.icon-moon');
        const htmlElement = document.documentElement;

        function setTheme(theme) {
            htmlElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'dark') {
                iconMoon.classList.add('icon-show');
                iconSun.classList.remove('icon-show');
            } else {
                iconSun.classList.add('icon-show');
                iconMoon.classList.remove('icon-show');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        });

        // ========================
        // VIEW TOGGLE
        // ========================
        const viewToggleBtn = document.getElementById('viewToggle');
        const iconGrid = viewToggleBtn.querySelector('.icon-grid');
        const iconList = viewToggleBtn.querySelector('.icon-list');

        function setView(mode) {
            viewMode = mode;
            localStorage.setItem('viewMode', mode);
            if (mode === 'grid') {
                iconList.classList.add('icon-show');
                iconGrid.classList.remove('icon-show');
            } else {
                iconGrid.classList.add('icon-show');
                iconList.classList.remove('icon-show');
            }
            renderFiles();
        }

        const savedView = localStorage.getItem('viewMode') || 'list';
        setView(savedView);

        viewToggleBtn.addEventListener('click', () => {
            setView(viewMode === 'list' ? 'grid' : 'list');
        });

        // ========================
        // SORT DROPDOWN & HEADER CLICKS
        // ========================
        const sortToggleBtn = document.getElementById('sortToggle');
        const sortMenu = document.getElementById('sortMenu');

        sortToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sortMenu.classList.toggle('show');
        });

        window.addEventListener('click', () => {
            sortMenu.classList.remove('show');
        });

        // Dropdown items
        document.querySelectorAll('.dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                const col = item.dataset.sort;
                if (sortColumn === col) {
                    sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = col;
                    sortOrder = 'asc';
                }
                sortAndRender();
            });
        });

        // Header column clicks
        document.querySelectorAll('.file-header .sortable').forEach(el => {
            el.addEventListener('click', () => {
                const col = el.dataset.sort;
                if (sortColumn === col) {
                    sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
                } else {
                    sortColumn = col;
                    sortOrder = 'asc';
                }
                sortAndRender();
            });
        });

        // ========================
        // INIT
        // ========================
        fetchFiles();
    </script>
</body>
</html>
